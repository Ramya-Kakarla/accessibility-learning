<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Focus Indicators and Skip Navigation - Fixed</title>
        <style>

            /* ============================================
               Fix 1: Skip navigation link
               Hidden off-screen by default using
               negative position — NOT display:none or
               visibility:hidden because those remove it
               from tab order entirely
            ============================================ */
            .skip-link {
                position: absolute;
                top: -100%;
                right: 0;
                background: #000;
                color: #fff;
                padding: 0.75rem 1.25rem;
                font-size: 1rem;
                text-decoration: none;
                z-index: 9999;
            }

            /* Appears visually only when focused via keyboard Tab */
            .skip-link:focus {
                top: 0;
            }

            /* ============================================
               Fix 2: Global focus indicator
               Never use outline: none without alternative.
               3px solid + offset gives clear visible ring
               that works on any background color
            ============================================ */
            
            *:focus {
                outline: 3px solid #005fcc;
                outline-offset: 2px;
            }
            
            *:focus-visible {
                outline: 3px solid #005fcc;
                outline-offset: 2px;
            }

            /* Basic page styles */
            body {
                font-family: sans-serif;
                margin: 0;
                padding: 0;
            }

            nav {
                background: #333;
                padding: 1rem;
            }

            nav a {
                color: white;
                margin-right: 1rem;
                text-decoration: none;
            }

            main {
                padding: 2rem;
            }

            button {
                padding: 0.5rem 1rem;
                margin: 0.5rem;
                cursor: pointer;
            }
            button:hover {
              background-color: #0057b8;
              color: white;
            }

            button:focus-visible {
             outline: 3px solid #005fcc;
             outline-offset: 2px;
             background-color: #0057b8;
             color: white;
            }

            input {
                padding: 0.5rem;
                margin: 0.5rem;
                display: block;
            }

        </style>
    </head>
    <body>

        <!-- Fix 3: Skip navigation link as very first element in body
             Visually hidden until focused — appears on first Tab press
             href targets the id of main content -->
       <a class="skip-link" href="#main-content">Skip to main content</a>

        <nav aria-label="Main navigation">
            <a href="/home">Home</a>
            <a href="/about">About</a>
            <a href="/articles">Articles</a>
            <a href="/contact">Contact</a>
        </nav>

        <!-- Fix 4: id matches the skip link href -->
      
        <main id="main-content" tabindex="-1">
            <h1>Welcome to TechBlog</h1>
            <p>Latest articles on web development and accessibility.</p>

            <h2>Subscribe</h2>
            <!-- All interactive elements now show focus ring via global rule -->
            <input type="email" placeholder="Enter your email">
            <button>Subscribe</button>

            <h2>Read More</h2>
            <a href="/article-1">Getting Started With React</a><br>
            <a href="/article-2">CSS Grid vs Flexbox</a><br>
            <a href="/article-3">Understanding Closures</a>
        </main>
          

    </body>
</html>
