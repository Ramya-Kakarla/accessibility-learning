
<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Focus Indicators and Skip Navigation - Broken</title>
        <style>
            /* Issue 1: outline removed with no alternative */
            a:focus,
            button:focus,
            input:focus {
                outline: none;
            }

            /* Issue 2: focus style only on hover, not keyboard focus */
            button:hover {
                background-color: #0057b8;
                color: white;
            }

            /* Basic page styles */
            body {
                font-family: sans-serif;
                margin: 0;
                padding: 0;
            }

            nav {
                background: #333;
                padding: 1rem;
            }

            nav a {
                color: white;
                margin-right: 1rem;
                text-decoration: none;
            }

            main {
                padding: 2rem;
            }

            button {
                padding: 0.5rem 1rem;
                margin: 0.5rem;
                cursor: pointer;
            }

            input {
                padding: 0.5rem;
                margin: 0.5rem;
                display: block;
            }
        </style>
    </head>
    <body>

        <!-- Issue 3: No skip navigation link — keyboard users must Tab
             through every nav link before reaching main content -->

        <nav aria-label="Main navigation">
            <a href="/home">Home</a>
            <a href="/about">About</a>
            <a href="/articles">Articles</a>
            <a href="/contact">Contact</a>
        </nav>

        <main id="main-content">
            <h1>Welcome to TechBlog</h1>
            <p>Latest articles on web development and accessibility.</p>

            <h2>Subscribe</h2>
            <!-- Issue 4: input and button have no visible focus indicator
                 because outline: none is set globally above -->
            <input type="email" placeholder="Enter your email">
            <button>Subscribe</button>

            <h2>Read More</h2>
            <a href="/article-1">Getting Started With React</a><br>
            <a href="/article-2">CSS Grid vs Flexbox</a><br>
            <a href="/article-3">Understanding Closures</a>
        </main>

    </body>
</html>
